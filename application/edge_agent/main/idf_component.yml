## IDF Component Manager Manifest File
dependencies:
  espressif/esp_board_manager:
    version: "^0.5.12"
    public: true
  espressif/esp_codec_dev:
    version: "~1.5"
  espressif/esp_wifi_remote:
    version: ">=0.10,<2.0"
    rules:
      - if: "target in [esp32p4]"
  espressif/esp_hosted:
    version: "2.12.3"
    rules:
      - if: "target in [esp32p4]"

  espressif2022/esp_emote_expression:
    version: "^1.0.0"

  espressif2022/esp_emote_gfx:
    version: "3.0.2"

  app_claw:
    path: ../../../components/common/app_claw

  app_config:
    path: ../components/app_config

  cap_agent_mgr:
    path: ../../../components/claw_capabilities/cap_agent_mgr

  cap_files:
    path: ../../../components/claw_capabilities/cap_files

  cap_http_request:
    path: ../../../components/claw_capabilities/cap_http_request

  cap_im_local:
    path: ../../../components/claw_capabilities/cap_im_local

  cap_im_platform:
    path: ../../../components/claw_capabilities/cap_im_platform

  cap_llm_config:
    path: ../../../components/claw_capabilities/cap_llm_config

  cap_llm_inspect:
    path: ../../../components/claw_capabilities/cap_llm_inspect

  cap_lua:
    path: ../../../components/claw_capabilities/cap_lua

  cap_mcp_client:
