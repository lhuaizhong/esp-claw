  cap_system:
    path: ../../../components/claw_capabilities/cap_system

  cap_web_search:
    path: ../../../components/claw_capabilities/cap_web_search

  captive_dns:
    path: ../../../components/common/captive_dns

  claw_cap:
    path: ../../../components/claw_modules/claw_cap

  claw_core:
    path: ../../../components/claw_modules/claw_core

  claw_event_router:
    path: ../../../components/claw_modules/claw_event_router

  claw_manager:
    path: ../../../components/claw_modules/claw_manager

